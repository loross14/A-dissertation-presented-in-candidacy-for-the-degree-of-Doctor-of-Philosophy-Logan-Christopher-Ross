<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">L.C. Ross copper record rosette mark</title>
  <desc id="desc">A temporary logan.engineering option 6 mark: a dark field, warm copper record rosette, radial room ticks, and a central L.C. Ross inscription. At favicon size the rosette silhouette and center band simplify the full name.</desc>
  <defs>
    <linearGradient id="field" x1="24" y1="18" x2="232" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17110d"/>
      <stop offset=".5" stop-color="#080705"/>
      <stop offset="1" stop-color="#181009"/>
    </linearGradient>
    <radialGradient id="copper" cx="37%" cy="28%" r="72%">
      <stop offset="0" stop-color="#ffd8a0"/>
      <stop offset=".2" stop-color="#d59052"/>
      <stop offset=".5" stop-color="#8f4526"/>
      <stop offset=".78" stop-color="#5a2316"/>
      <stop offset="1" stop-color="#2b100a"/>
    </radialGradient>
    <radialGradient id="inner" cx="42%" cy="30%" r="70%">
      <stop offset="0" stop-color="#1d1711"/>
      <stop offset=".58" stop-color="#0e0b08"/>
      <stop offset="1" stop-color="#030302"/>
    </radialGradient>
    <linearGradient id="band" x1="73" y1="105" x2="183" y2="151" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f190f"/>
      <stop offset=".5" stop-color="#130805"/>
      <stop offset="1" stop-color="#5a2415"/>
    </linearGradient>
    <filter id="shadow" x="-28%" y="-28%" width="156%" height="164%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity=".68"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="34" fill="url(#field)"/>
  <path d="M39 202C68 222 188 222 217 202" fill="none" stroke="#1b0b07" stroke-width="10" stroke-linecap="round" opacity=".72"/>
  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="89" fill="url(#copper)"/>
    <circle cx="128" cy="128" r="70" fill="url(#inner)" stroke="#f4c58f" stroke-width="1.2" opacity=".98"/>
    <circle cx="128" cy="128" r="86" fill="none" stroke="#d9a85c" stroke-width="4"/>
    <circle cx="128" cy="128" r="55" fill="none" stroke="#d9a85c" stroke-width="1.4" opacity=".42"/>
    <g fill="none" stroke="#ffe2aa" stroke-width="3" stroke-linecap="round">
      <path d="M128 38v28"/>
      <path d="M128 190v28"/>
      <path d="M38 128h28"/>
      <path d="M190 128h28"/>
      <path d="M65 65l20 20"/>
      <path d="M171 171l20 20"/>
      <path d="M191 65l-20 20"/>
      <path d="M85 171l-20 20"/>
    </g>
    <g fill="none" stroke="#2b100a" stroke-width="2" stroke-linecap="round" opacity=".72">
      <path d="M128 75v12"/>
      <path d="M128 169v12"/>
      <path d="M75 128h12"/>
      <path d="M169 128h12"/>
    </g>
    <path d="M73 104h110v50H73Z" fill="url(#band)" stroke="#d9a85c" stroke-width="1.4"/>
    <path d="M84 96C106 86 150 86 172 96" fill="none" stroke="#ffd79a" stroke-width="2" stroke-linecap="round" opacity=".72"/>
    <path d="M84 162C106 171 150 171 172 162" fill="none" stroke="#1a0b07" stroke-width="2.4" stroke-linecap="round" opacity=".7"/>
    <text x="128" y="125" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="800" letter-spacing=".55" fill="#ffe2aa" stroke="#1a0b07" stroke-width="1.25" paint-order="stroke">L.C. Ross</text>
    <text x="128" y="146" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="950" letter-spacing="1.35" fill="#ffe2aa">RECORDED</text>
    <circle cx="128" cy="128" r="4.2" fill="#ffe2aa" opacity=".94"/>
  </g>
  <path d="M50 36L206 220" stroke="#fff2c6" stroke-width="1.3" stroke-linecap="round" opacity=".12"/>
  <path d="M206 36L50 220" stroke="#d88444" stroke-width="1" stroke-linecap="round" opacity=".1"/>
</svg>
